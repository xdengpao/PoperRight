# Alembic 配置文件
# 参考：https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# 迁移脚本目录
script_location = alembic

# 迁移文件命名格式：时间戳_描述
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 时区（用于文件名时间戳）
timezone = Asia/Shanghai

# 版本文件目录（相对于 script_location）
version_locations = %(here)s/alembic/versions

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
