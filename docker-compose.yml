services:
  # ===== FastAPI 应用 =====
  app:
    build: .
    container_name: quant-app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/quant_db
      TIMESCALE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-password}@timescaledb:5432/quant_ts
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LOCAL_KLINE_DATA_DIR: /data/kline
    ports:
      - "8000:8000"
    volumes:
      - ${LOCAL_KLINE_DATA_DIR:-/tmp/kline_data}:/data/kline:ro
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ===== Celery Worker =====
  celery-worker:
    build: .
    container_name: quant-celery-worker
    command: celery -A app.core.celery_app worker --loglevel=info -Q data_sync,screening,backtest,review
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/quant_db
      TIMESCALE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-password}@timescaledb:5432/quant_ts
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LOCAL_KLINE_DATA_DIR: /data/kline
    volumes:
      - ${LOCAL_KLINE_DATA_DIR:-/tmp/kline_data}:/data/kline:ro
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.core.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ===== Celery Beat 定时任务 =====
  celery-beat:
    build: .
    container_name: quant-celery-beat
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/quant_db
      TIMESCALE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-password}@timescaledb:5432/quant_ts
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ===== TimescaleDB（行情时序数据）=====
  timescaledb:
    image: docker.m.daocloud.io/timescale/timescaledb:latest-pg16
    container_name: quant-timescaledb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: quant_ts
    ports:
      - "5432:5432"
    volumes:
      - ${TIMESCALEDB_DATA_DIR:-timescaledb_data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ===== PostgreSQL（业务数据）=====
  postgres:
    image: docker.m.daocloud.io/library/postgres:16
    container_name: quant-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: quant_db
    ports:
      - "5433:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:-postgres_data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ===== Redis =====
  redis:
    image: docker.m.daocloud.io/library/redis:7
    container_name: quant-redis
    ports:
      - "6379:6379"
    volumes:
      - ${REDIS_DATA_DIR:-redis_data}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===== Nginx 反向代理 =====
  nginx:
    image: docker.m.daocloud.io/library/nginx:alpine
    container_name: quant-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  timescaledb_data:
    external: true
    name: poperright_timescaledb_data
  postgres_data:
    external: true
    name: poperright_postgres_data
  redis_data:
    external: true
    name: poperright_redis_data
